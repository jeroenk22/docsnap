# sites/mendrix.yaml
# ─────────────────────────────────────────────
# MendriX Support Documentatie
# ─────────────────────────────────────────────

title:    "MendriX API Documentatie"
base_url:  "https://support.mendrix.nl"
start_url: "https://support.mendrix.nl/space/API/93881066/Getting+Started"
output:   "mendrix_docs.md"
headless: false   # browser zichtbaar voor manual login

# Alleen pagina's binnen de API-space meenemen
scope_paths:
  - /space/API

# SSO-login: browser opent, jij logt in via "Aanmelden", daarna Enter drukken
login:
  method: manual
  url:    "https://support.mendrix.nl/login"

# Accordions, <details> en tabs uitklappen
expand:
  enabled: true
  wait_ms: 800
  click_selectors:
    - "summary"
    - ".accordion-button"
    - "[data-bs-toggle='collapse']"
    - "[aria-expanded='false']"
  custom_js:
    # Klap alle sidebar-navigatie-items uit (boomstructuur)
    - |
      document.querySelectorAll(
        'nav [aria-expanded="false"], .sidebar [aria-expanded="false"], ' +
        '[data-ui-id="sidebar"] [aria-expanded="false"], ' +
        '.tree-item--collapsed, [data-ui-id="page-tree-item--collapsed"]'
      ).forEach(el => { try { el.click(); } catch(e) {} });
    # Zet CodeMirror-blokken om naar standaard <pre><code> zodat html2text ze correct verwerkt
    - |
      document.querySelectorAll('[data-ui-id="code-block"]').forEach(block => {
        const lines = Array.from(block.querySelectorAll('.cm-line')).map(l => l.textContent);
        const pre = document.createElement('pre');
        const code = document.createElement('code');
        code.textContent = lines.join('\n');
        pre.appendChild(code);
        block.replaceWith(pre);
      });

# Welk deel van de pagina we willen
content:
  selectors:
    - "main"
    - "article"
    - ".docs-content"
    - ".content"
    - "#content"
  exclude_selectors:
    - "nav"
    - "footer"
    - ".breadcrumb"
    # .sidebar NIET uitsluiten — collect_links leest links uit de hele DOM,
    # niet alleen uit de content. De sidebar-tekst valt al weg door de content-selectors.

crawl:
  max_pages: 500
  # Wacht tot de hoofdcontent geladen is vóór links verzamelen / extractie
  wait_for_selector: "h1, main, article, [data-ui-id='page-content-body']"

include_images: false
