# sites/mendrix_swagger.yaml
# ─────────────────────────────────────────────
# MendriX API Swagger docs (Confluence-pagina)
# Versie 2025.3
# ─────────────────────────────────────────────

title:     "MendriX API 2025.3"
base_url:  "https://mendrix.atlassian.net"
start_url: "https://mendrix.atlassian.net/wiki/spaces/MAD/pages/1866694660/2025.3"
output:    "mendrix_swagger_docs.md"
headless:  false   # browser zichtbaar voor manual login

# Alleen deze ene Confluence-pagina scrapen
scope_paths:
  - /wiki/spaces/MAD/pages/1866694660

# Atlassian SSO login
login:
  method:      manual
  url:         "https://mendrix.atlassian.net/wiki/spaces/MAD/pages/1866694660/2025.3"
  wait_until:  load        # Atlassian bereikt nooit "networkidle" door continue achtergrond-JS
  profile_dir: ".profiles/atlassian"  # Sessie/cookies worden hier bewaard — eenmalig inloggen

expand:
  enabled: true
  wait_ms: 2000        # Swagger UI heeft tijd nodig om te renderen na uitklappen
  include_frames: true # Zoek ook in iframes (Confluence macro)

  click_selectors: []  # Swagger heeft eigen expand-logica via custom_js hieronder

  custom_js:
    # Stap 1: Klap alle Swagger-secties (tags) open
    - |
      document.querySelectorAll('button.expand-operation[aria-expanded="false"]')
        .forEach(btn => { try { btn.click(); } catch(e) {} });

    # Stap 2: Wacht even en klap dan alle individuele routes open
    - |
      (async () => {
        await new Promise(r => setTimeout(r, 1000));
        document.querySelectorAll('.opblock-control-arrow[aria-expanded="false"], button[class*="opblock"][aria-expanded="false"]')
          .forEach(btn => { try { btn.click(); } catch(e) {} });
      })();

    # Stap 3: Wacht en klap ook routes open die nog dicht zijn (Swagger laadt soms traag)
    - |
      (async () => {
        await new Promise(r => setTimeout(r, 1500));
        document.querySelectorAll('.opblock:not(.is-open) .opblock-summary')
          .forEach(el => { try { el.click(); } catch(e) {} });
      })();

    # Stap 4: CodeMirror-blokken → <pre><code>
    - |
      document.querySelectorAll('[data-ui-id="code-block"]').forEach(block => {
        const lines = Array.from(block.querySelectorAll('.cm-line')).map(l => l.textContent);
        const pre = document.createElement('pre');
        const code = document.createElement('code');
        code.textContent = lines.join('\n');
        pre.appendChild(code);
        block.replaceWith(pre);
      });

# Confluence-pagina content
content:
  include_frames: true  # Zoek ook in iframes als content niet in hoofdframe staat
  selectors:
    - ".swagger-ui"           # Swagger UI container (meest specifiek)
    - "#main-content"         # Confluence hoofdcontent
    - ".wiki-content"         # Confluence wiki content
    - "main"
  exclude_selectors:
    - "nav"
    - "footer"
    - ".aui-header"
    - "#breadcrumb-section"
    - ".ia-splitter"          # Confluence zijbalk

crawl:
  max_pages: 1
  wait_for_selector: "#main-content, .wiki-content"   # wacht op Confluence-shell
  wait_for_frames:   ".swagger-ui"                    # wacht daarna op Swagger UI in iframe
  frame_timeout_ms:  30000

include_images: false
